<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Chess Analyzer Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 20px;
      background: #1a1a2e;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    h2 {
      color: #e2b96f;
      font-size: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: #aaa;
      font-size: 12px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #e2b96f; }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: #e2b96f;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { opacity: 0.85; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #8bc34a;
      min-height: 16px;
      text-align: center;
    }
    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h2>♟ Chess Analyzer</h2>

  <label for="apiKey">OpenAI API Key</label>
  <input type="password" id="apiKey" placeholder="sk-..." />

  <button id="save">Save Key</button>
  <div class="status" id="status"></div>
  <p class="hint">Your key is stored locally in Chrome and never sent anywhere except OpenAI's API.</p>

  <script src="popup.js"></script>
</body>
</html>
